name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  DJANGO_SETTINGS_MODULE: app.settings

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cache pip packages
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('server/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd server
          pip install -r requirements.txt
          pip install pytest-cov  # Install coverage reporting

      # Run Tests with coverage
      - name: Run Tests with Coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/github_actions
          SECRET_KEY: ${{ secrets.SECRET_KEY}}
          DEBUG: ${{secrets.DEBUG}}
          DJANGO_SETTINGS_MODULE: app.settings
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          EMAIL_HOST_USER: ${{secrets.EMAIL_HOST_USER}}
          DEFAULT_FROM_EMAIL: ${{secrets.DEFAULT_FROM_EMAIL}}
          EMAIL_HOST_PASSWORD: ${{secrets.EMAIL_HOST_PASSWORD}}
          EMAIL_HOST: ${{secrets.EMAIL_HOST}}
        run: |
          cd server
          pytest -v --tb=short --cov=. --cov-report=term --cov-report=xml
  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      # Build and Deploy with Docker Compose
      - name: Build and Deploy Docker containers
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEBUG: ${{secrets.DEBUG}}
          DJANGO_SETTINGS_MODULE: app.settings
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          EMAIL_HOST_USER: ${{secrets.EMAIL_HOST_USER}}
          DEFAULT_FROM_EMAIL: ${{secrets.DEFAULT_FROM_EMAIL}}
          EMAIL_HOST_PASSWORD: ${{secrets.EMAIL_HOST_PASSWORD}}
          EMAIL_HOST: ${{secrets.EMAIL_HOST}}
        run: |
          cd server
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml build --no-cache
          docker compose -f docker-compose.prod.yml up -d

      # Verify deployment
      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://localhost:8000/health || exit 1