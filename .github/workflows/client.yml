name: Frontend CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with: 
                    node-version: '22'
                    cache: 'npm'
            
            -   name: Install dependencies
                run: npm ci
            
            -   name: Run tests (if any)
                run: npm test -- --watchAll=false --ci
                continue-on-error: true 

        
            -   name: Build
                run: npm run build
