<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <h2 style="color: #e74c3c;">Article Rejected</h2>
    
    <p>Dear {{ editor_username }},</p>
    
    <p>Your article <strong>"{{ article_title }}"</strong> was rejected by <strong>{{ admin_username }}</strong>.</p>
    
    <div style="background: #fef9e7; padding: 15px; border-radius: 5px; margin: 15px 0; border-left: 4px solid #e74c3c;">
        <p><strong>Reason for rejection:</strong></p>
        <p style="color: #555;">{{ reason }}</p>
    </div>
    
    <p>Please review the feedback, make necessary changes, and resubmit.</p>
    
    <p>
        <a href="{{ edit_url }}" style="background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
            Edit Article
        </a>
    </p>
    
    <hr style="border: 1px solid #eee; margin: 20px 0;">
    <p style="color: #888; font-size: 12px;">HMIS Knowledge Base Team</p>
</body>
</html>
