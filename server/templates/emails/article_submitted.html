<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <h2 style="color: #2c3e50;">New Article Submitted for Review</h2>
    
    <p>Dear {{ admin_username }},</p>
    
    <p><strong>{{ editor_username }}</strong> has submitted a new article for review:</p>
    
    <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 15px 0;">
        <h3 style="margin-top: 0; color: #2c3e50;">{{ article_title }}</h3>
        <p><strong>Submitted:</strong> {{ submitted_at }}</p>
    </div>
    
    <p>Please review the article and take appropriate action.</p>
    
    <p>
        <a href="{{ review_url }}" style="background: #2c3e50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
            Review Article
        </a>
    </p>
    
    <hr style="border: 1px solid #eee; margin: 20px 0;">
    <p style="color: #888; font-size: 12px;">HMIS Knowledge Base Team</p>
</body>
</html>
