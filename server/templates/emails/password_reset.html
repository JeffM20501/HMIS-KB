<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <h2>Password Reset Request</h2>
    <p>Hello {{ username }},</p>
    <p>You requested to reset your password. Use the following OTP to reset it:</p>
    <h1 style="font-size: 32px; letter-spacing: 4px; color: #2c3e50;">{{ otp }}</h1>
    <p>This OTP is valid for <strong>{{ expiry_minutes }} minutes</strong>.</p>
    <p>If you did not request this, please ignore this email.</p>
    <p>Best regards,<br>HMIS Team</p>
</body>
</html>
